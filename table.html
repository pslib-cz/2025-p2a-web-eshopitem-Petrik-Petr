<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/table.css">
</head>
<body>
    <table>
        <tr>
            <th>A</th>
            <th>B</th>
            <th>C</th>
            <th>D</th>
            <th>E</th>
        </tr>
        <tr>
            <th>I.</th>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <th>II.</th>
            <td colspan="2">5</td>
            <td rowspan="2">6</td>
            <td>7</td>
        </tr>
        <tr>
            <th>III.</th>
            <td colspan="2" rowspan="2">8</td>
            <td>9</td>
        </tr>
        <tr>
            <th>IV.</th>
            <td>10</td>
            <td>11</td>
        </tr>
    </table>
</body>
</html>
